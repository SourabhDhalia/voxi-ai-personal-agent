<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024" role="img" aria-labelledby="title desc">
  <title id="title">Voxi Claw Logo</title>
  <desc id="desc">Anime cyber claw themed vector logo for Voxi Claw with transparent background.</desc>
  <defs>
    <linearGradient id="cyanGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#00f5ff"/>
      <stop offset="100%" stop-color="#0077ff"/>
    </linearGradient>
    <linearGradient id="whiteGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#dfe7ef"/>
    </linearGradient>
    <filter id="softGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Transparent background intentionally left empty -->

  <!-- Cyber ring -->
  <g fill="none" stroke-linecap="round">
    <path d="M205 428 C206 245 352 112 521 119 C680 126 811 251 826 406" stroke="#06101f" stroke-width="22"/>
    <path d="M205 428 C206 245 352 112 521 119 C680 126 811 251 826 406" stroke="url(#cyanGrad)" stroke-width="8" stroke-dasharray="92 58 38 42"/>
    <path d="M158 464 C166 558 216 638 286 692" stroke="#06101f" stroke-width="16"/>
    <path d="M868 304 C899 379 898 464 866 538" stroke="#06101f" stroke-width="16"/>
    <path d="M158 464 C166 558 216 638 286 692" stroke="#00eaff" stroke-width="6" stroke-dasharray="70 45"/>
    <path d="M868 304 C899 379 898 464 866 538" stroke="#00eaff" stroke-width="6" stroke-dasharray="60 45"/>
  </g>

  <!-- Main mascot silhouette -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <path d="M326 530
             C281 474 269 393 301 326
             L244 263 L332 278
             L358 65 L455 229
             C506 194 575 188 636 216
             L776 54 L746 258 L809 219 L777 328 L854 321
             L791 395 L847 437 L754 457
             C722 548 636 604 535 604
             C445 604 371 576 326 530Z"
          fill="#06101f" stroke="#020712" stroke-width="18"/>

    <!-- Cyan ear / cheek accents -->
    <path d="M630 508 L717 233 L733 412 Z" fill="url(#cyanGrad)" opacity="0.95"/>
    <path d="M722 88 L646 311 L777 191" fill="none" stroke="#00dfff" stroke-width="10"/>
    <path d="M708 281 L680 365 L747 330" fill="none" stroke="#00dfff" stroke-width="8"/>
    <circle cx="685" cy="319" r="20" fill="#06101f" stroke="#00eaff" stroke-width="9"/>
    <path d="M712 210 H756 M703 238 H746 M695 266 H729" stroke="#00eaff" stroke-width="11"/>

    <!-- White anime hair -->
    <path d="M291 412
             C356 286 466 222 589 232
             C506 271 458 324 423 397
             C486 348 552 318 623 314
             C545 365 491 422 456 497
             C407 465 366 445 291 412Z"
          fill="url(#whiteGrad)" stroke="#020712" stroke-width="10"/>
    <path d="M271 492 L346 429 L331 548 L390 470 L398 570 L450 495 L435 602" fill="url(#whiteGrad)" stroke="#020712" stroke-width="10"/>

    <!-- Eye -->
    <path d="M474 426 C518 389 582 390 626 426 C582 452 520 454 474 426Z" fill="#eef9ff" stroke="#020712" stroke-width="8"/>
    <path d="M542 397 L575 397 L564 449 L537 449Z" fill="url(#cyanGrad)" filter="url(#softGlow)"/>
    <path d="M468 424 C522 396 581 399 626 426" fill="none" stroke="#00eaff" stroke-width="5"/>

    <!-- Voice waveform -->
    <g stroke="#00eaff" stroke-width="13" stroke-linecap="round" filter="url(#softGlow)">
      <path d="M412 566 V546"/>
      <path d="M435 581 V531"/>
      <path d="M459 602 V511"/>
      <path d="M484 620 V492"/>
      <path d="M509 602 V511"/>
      <path d="M533 581 V531"/>
      <path d="M556 566 V546"/>
    </g>
  </g>

  <!-- Claw paw -->
  <g stroke-linejoin="round" stroke-linecap="round">
    <path d="M612 530
             C649 470 713 463 751 509
             C779 477 842 480 865 534
             C918 520 962 552 963 616
             C931 664 865 672 807 660
             C744 710 646 704 599 644
             C574 612 584 562 612 530Z"
          fill="#06101f" stroke="#020712" stroke-width="16"/>
    <path d="M644 572 C660 535 694 527 721 555 C698 606 683 645 672 689 C641 657 630 616 644 572Z" fill="url(#whiteGrad)" stroke="#020712" stroke-width="8"/>
    <path d="M759 555 C782 520 819 519 843 550 C824 606 808 650 797 695 C761 659 745 609 759 555Z" fill="url(#whiteGrad)" stroke="#020712" stroke-width="8"/>
    <path d="M884 572 C909 544 943 553 956 589 C937 636 918 671 900 704 C873 665 864 612 884 572Z" fill="url(#whiteGrad)" stroke="#020712" stroke-width="8"/>
    <path d="M623 541 C659 493 705 496 741 535" fill="none" stroke="#ffffff" stroke-width="8"/>
    <path d="M742 533 C783 488 843 494 867 545" fill="none" stroke="#ffffff" stroke-width="8"/>
    <path d="M858 546 C901 520 949 538 966 589" fill="none" stroke="#ffffff" stroke-width="8"/>
    <path d="M632 593 C647 628 669 652 700 666" fill="none" stroke="#00dfff" stroke-width="6" opacity="0.8"/>
    <path d="M777 586 C789 625 811 652 842 667" fill="none" stroke="#00dfff" stroke-width="6" opacity="0.8"/>
  </g>

  <!-- Wordmark back plate -->
  <path d="M83 642 L273 642 L300 738 L399 637 L656 637 L688 590 L929 590 L876 670 L950 670 L829 817 L716 817 L644 928 L637 817 L335 817 L261 905 L267 812 L152 812 Z"
        fill="#06101f" stroke="#020712" stroke-width="16" stroke-linejoin="round"/>
  <path d="M96 648 L274 648 L303 739 L400 643 L661 643 L692 598 L918 598" fill="none" stroke="#00cfff" stroke-width="7" opacity="0.9"/>

  <!-- VOXI letters as vector text with outlines -->
  <g font-family="Impact, Anton, Arial Black, sans-serif" font-weight="900" text-anchor="middle">
    <text x="512" y="742" font-size="182" fill="#020712" stroke="#020712" stroke-width="30" letter-spacing="-10">VOXI</text>
    <text x="512" y="742" font-size="182" fill="url(#whiteGrad)" stroke="#ffffff" stroke-width="3" letter-spacing="-10">VOXI</text>
  </g>

  <!-- stylized inner voice mark in O -->
  <g fill="#00eaff" filter="url(#softGlow)">
    <rect x="463" y="681" width="14" height="35" rx="7" transform="skewX(-14)"/>
    <rect x="491" y="674" width="14" height="42" rx="7" transform="skewX(-14)"/>
    <rect x="520" y="681" width="14" height="35" rx="7" transform="skewX(-14)"/>
  </g>

  <!-- CLAW letters -->
  <g font-family="Impact, Anton, Arial Black, sans-serif" font-weight="900" text-anchor="middle" transform="skewX(-8)">
    <text x="514" y="882" font-size="157" fill="#020712" stroke="#020712" stroke-width="28" letter-spacing="-2">CLAW</text>
    <text x="514" y="882" font-size="157" fill="url(#cyanGrad)" stroke="#00f5ff" stroke-width="3" letter-spacing="-2">CLAW</text>
  </g>

  <!-- Slash accents -->
  <g fill="url(#cyanGrad)" stroke="#020712" stroke-width="8" stroke-linejoin="round">
    <path d="M661 896 L724 827 L705 915 Z"/>
    <path d="M735 913 L809 829 L778 943 Z"/>
    <path d="M824 888 L907 800 L846 922 Z"/>
  </g>
</svg>
