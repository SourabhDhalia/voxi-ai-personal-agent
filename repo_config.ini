# Voxi Binary Repository Configuration
#
# Used by deploy.sh to set up on-device repos for installing
# runtime dependencies (e.g., jq, curl, bash).
#
# Format: key = value
# Configure base and platform repo URLs for your target snapshot.

[repos]
# Voxi Base repository (core OS packages)
base = https://download.voxi.org/snapshots/VOXI/Voxi/Voxi-Base/reference/repos/standard/packages/

# Voxi Platform repository (platform-specific packages)
platform = https://download.voxi.org/snapshots/VOXI/Voxi/Voxi-Unified/reference/repos/emulator/packages/
